<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food order form</title>
</head>
<body>
        // I think lunch ni 
    <h2>Food order form </h2>   
    <form id="Food Form" onsubmit="return generateInvoice()">
        <label for="User Name">Full Name: </label>
        <input type="text" id="User Name" required> <br><br>

        <label for="Class Section">Grade & Section: </label>
        <input type="text" id="Class Section" required> <br><br>

        <label for="Food Menu">Food: </label>
        <select id="Food Menu">
            <option value="Chicken meal">Chicken meal (PHP 75) </option>
            <option value="Pork meal">Pork meal (PHP 85) </option>
            <option value="Beef meal">Beef meal (PHP 105) </option>
        </select><br><br>

        <label for="Item Amount">Quantity (Max of 5): </label>
        <input type="number" id="Item Amount" min="1" max="5" required> <br><br>

        <label for="User Category">Customer Type </label><br>
        <select id="User Category">
            <option value="Student">Student </option>
            <option value="Faculty/Staff">Faculty/Staff </option>
        </select><br><br>

        <input type="submit" value="Place Order">
    </form>

    <hr>
    <h3>ORDER SUMMARY</h3>
    <div id="outputArea"> </div>

    <script>
        function generateInvoice() {
            const clientName = document.getElementById("User Name").value;
            const levelSection = document.getElementById("Class Section").value;
            const dishChosen = document.getElementById("Food Menu").value;
            const numUnits = parseInt(document.getElementById("Item Amount").value);
            const accountType = document.getElementById("User Category").value;

            const unitPrice = getItemPrice(dishChosen);
            const grossAmount = unitPrice * numUnits;
            const appliedSavings = getUserDiscount(grossAmount, accountType);
            const netTotal = grossAmount - appliedSavings;

            // Print information as shown in sample outputs [cite: 26]
            document.getElementById("outputArea").innerHTML = `
                <p>Name: ${clientName}</p>
                <p>Grade & Section: ${levelSection}</p>
                <p>Order: ${dishChosen} (PHP ${unitPrice})</p>
                <p>Quantity: ${numUnits}</p>
                <p>Subtotal: PHP ${grossAmount}</p>
                <p>Discount: PHP ${appliedSavings}</p>
                <p>Total: PHP ${netTotal}</p>
                <p>Thank you for your patronage!</p>
            `;

            return false; // Avoid changing webpages [cite: 36]
        }

        // Return price using a switch statement [cite: 27]
        function getItemPrice(selectedFood) {
            switch (selectedFood) {
                case "Chicken meal":
                    return 75; // Chicken meal = P75 [cite: 29]
                case "Pork meal":
                    return 85; // Pork meal = P85 [cite: 31]
                case "Beef meal":
                    return 105; // Beef meal = P105 [cite: 32]
                default:
                    return "Item not found"; // Anything else -> Item not found [cite: 33]
            }
        }

        // Return discount: 20% for students, 0 if not [cite: 34]
        function getUserDiscount(cost, category) {
            if (category === "Student") {
                return cost * 0.20; 
            } else {
                return 0;
            }
        }
    </script>

</body>
</html>
